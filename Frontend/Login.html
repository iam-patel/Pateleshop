<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Page</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        min-height: 100vh;
        background: url("https://images.pexels.com/photos/949587/pexels-photo-949587.jpeg")
                    no-repeat center/cover;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .login-card {
        width: 350px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        color: #fff;
    }

    .login-card h2 {
        font-size: 28px;
        margin-bottom: 5px;
    }

    .login-card p {
        font-size: 14px;
        margin-bottom: 25px;
        opacity: 0.9;
    }

    .input-box {
        margin-bottom: 15px;
        position: relative;
    }

    .input-box input {
        width: 100%;
        padding: 12px 15px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.4);
        background: rgba(255,255,255,0.15);
        outline: none;
        color: #0c0202;
        font-size: 15px;
    }

    .input-box input::placeholder {
        color: rgba(0, 0, 0, 0.973);
    }

    .remember {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 14px;
        margin: 10px 0 20px;
    }

    .remember input {
        accent-color: #4CAF50;
    }

    .remember a {
        color: #fff;
        text-decoration: none;
        opacity: 0.9;
    }

    .remember a:hover {
        text-decoration: underline;
        opacity: 1;
    }

    .btn {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: none;
        background: linear-gradient(135deg, #8BC34A, #4CAF50);
        color: #fff;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn:hover {
        opacity: 0.9;
    }

    .signup {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    .signup a {
        color: #fff;
        font-weight: bold;
        text-decoration: none;
    }

    .error{color:#ff0000;background:#fff0f0;border:1px solid #ffb3b3;padding:8px;border-radius:8px;margin-top:8px;text-align:center;}
    /* Slider panes for customer / shopkeeper */
    .slider { width:100%; max-width:360px; }
    .slider-track { display:flex; width:200%; transform:translateX(0); transition:transform 260ms ease; }
    .pane { width:50%; padding-right:18px; box-sizing:border-box; visibility: hidden; opacity: 0; }
    .pane.active{ visibility: visible; opacity: 1; }
    @media (max-width:420px){ .login-card { width:92%; padding:20px } .pane { width:100% } .slider-track { width:200% } }
</style>
</head>

<body>

<div class="login-card" id="login-card">
        <h2>Login</h2>
        <p>Welcome back please login to your account</p>

        <div class="slider" id="login-slider">
            <div class="slider-track" id="login-track">
                <div class="pane active">
                    <div class="input-box">
                        <input id="mobile" type="tel" placeholder="Mobile Number" inputmode="numeric" pattern="[0-9]{10}">
                    </div>

                    <div class="input-box">
                        <input id="password" type="password" placeholder="Password">
                    </div>

                    <div class="remember">
                        <div>
                            <input id="remember" type="checkbox" checked>
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="forgetpass.html">Forgot password?</a>
                    </div>

                    <div id="error" class="error" style="display:none" role="alert" aria-live="assertive"></div>

                    <button id="loginBtn" class="btn">Login</button>

                    <div class="signup">Don’t have an account? <a href="signup.html">Signup</a></div>
                </div>

                <div class="pane">
                    <div class="input-box">
                        <input id="shop-mobile" type="tel" placeholder="Shop Mobile" inputmode="numeric" pattern="[0-9]{10}">
                    </div>
                    <div class="input-box">
                        <input id="shop-password" type="password" placeholder="Shop Password">
                    </div>
                    <div id="shop-error" class="error" style="display:none" role="alert" aria-live="assertive"></div>
                    <button id="shopLoginBtn" class="btn">Shopkeeper Login</button>
                    <div class="signup">Need a shop account? <a href="signup.html">Register</a></div>
                </div>
            </div>

            <div style="display:flex;justify-content:space-between;margin-top:12px;gap:8px;">
                <button id="cus-btn" class="btn secondary" type="button">Customer</button>
                <button id="shop-btn" class="btn" type="button">Shopkeeper</button>
            </div>
        </div>
 
</div>

<script>
(() => {
    const mobile = document.getElementById('mobile');
    const password = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const remember = document.getElementById('remember');
    const error = document.getElementById('error');

    function showError(msg) {
        error.textContent = msg;
        error.style.display = 'block';
    }
    function clearError() {
        error.textContent = '';
        error.style.display = 'none';
    }

    async function doLogin() {
        clearError()
        const m = mobile.value.trim();
        const p = password.value;
        if (!/^[0-9]{10}$/.test(m)) { showError('Please enter a valid 10-digit mobile number'); mobile.focus(); return; }
        if (p.length < 6) { showError('Password must be at least 6 characters'); password.focus(); return; }

        try {
            loginBtn.disabled = true;
            const resp = await fetch('http://localhost:3000/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mobile: m, password: p })
            });
            const data = await resp.json();
            if (!resp.ok) {
                showError(data.message || 'Login failed');
                return;
            }

            // Store token (remember => localStorage, else sessionStorage)
            if (data.token) {
                if (remember && remember.checked) {
                    localStorage.setItem('authToken', data.token);
                } else {
                    sessionStorage.setItem('authToken', data.token);
                }
            }

           const displayName = data.user?.name || data.user?.mobile || m;
             localStorage.setItem('userName', displayName);

            // Login successful
            window.location.href = 'WEB.HTML';
        } catch (err) {
            showError('Something Went Wrong.');
        } finally {
            loginBtn.disabled = false;
        }
    }

    loginBtn.addEventListener('click', doLogin);

    [mobile, password].forEach(el => {
        el.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doLogin();
        });
    });
})();

// Slider behavior for login page
(function(){
    const track = document.getElementById('login-track');
    const cusBtn = document.getElementById('cus-btn');
    const shopBtn = document.getElementById('shop-btn');
    const panes = document.querySelectorAll('.pane');
    const shopLoginBtn = document.getElementById('shopLoginBtn');
    const shopMobile = document.getElementById('shop-mobile');
    const shopPassword = document.getElementById('shop-password');
    const shopError = document.getElementById('shop-error');
    let active = 0;
    function show(i){
        active = i;
        track.style.transform = `translateX(${ -i * 50 }%)`;
        panes.forEach((p, idx) => {
            if (idx === i) p.classList.add('active');
            else p.classList.remove('active');
        });
    }
    cusBtn.addEventListener('click', ()=> show(0));
    shopBtn.addEventListener('click', ()=> show(1));

    // swipe
    let startX=0, dx=0;
    track.addEventListener('pointerdown', (ev)=>{ startX = ev.clientX; track.setPointerCapture(ev.pointerId); });
    track.addEventListener('pointermove', (ev)=>{ if(!startX) return; dx = ev.clientX - startX; track.style.transition = 'none'; track.style.transform = `translateX(${ -active*50 + (dx / track.clientWidth) * 100 }%)`; });
    track.addEventListener('pointerup', ()=>{ track.style.transition=''; if(Math.abs(dx)>40){ if(dx<0) show(Math.min(1,active+1)); else show(Math.max(0,active-1)); } else show(active); startX=0; dx=0; });
    track.style.transition='transform 260ms ease'; show(0);

    // shopkeeper login handler (frontend only)
    shopLoginBtn.addEventListener('click', async ()=>{
        shopError.style.display = 'none';
        const m = shopMobile.value.trim(); const p = shopPassword.value;
        if(!/^[0-9]{10}$/.test(m)){ shopError.textContent='Enter valid mobile'; shopError.style.display='block'; return; }
        if(p.length<6){ shopError.textContent='Password must be at least 6 chars'; shopError.style.display='block'; return; }
        try{
            shopLoginBtn.disabled = true;
            const resp = await fetch('http://localhost:3000/api/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mobile: m, password: p, role: 'shopkeeper' }) });
            const data = await resp.json();
            if(!resp.ok){ shopError.textContent = data.message || 'Login failed'; shopError.style.display='block'; return; }
            if (data.token) { localStorage.setItem('authToken', data.token); }
            window.location.href = 'WEB.HTML';
        }catch(err){ shopError.textContent='Something went wrong'; shopError.style.display='block'; }
        finally{ shopLoginBtn.disabled = false; }
    });
})();
</script>

</body>
</html>
